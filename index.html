<!DOCTYPE html><html lang="uk"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css"><title>NeurofitnessDay</title></head>
<body>
<!-- Access screen is isolated from the game markup. -->
<main id="authScreen" class="app authScreen">
<img class="authLogo" src="assets/neuroshko.png" alt="NeurofitnessDay" onerror="this.style.display='none'">
<h1>NeurofitnessDay</h1>
<section class="authCard" aria-labelledby="accessTitle">
<h2 id="accessTitle">Доступ лише для покупців</h2>
<p>Введіть код доступу, який ви отримали після покупки.</p>
<form id="authForm" novalidate>
<label class="srOnly" for="accessCode">Код доступу</label>
<input id="accessCode" type="password" autocomplete="current-password" placeholder="Код доступу" required>
<button class="main" type="submit">Увійти</button>
</form>
<div id="authError" class="authError hidden" role="alert">
<strong>Код доступу недійсний.</strong>
<span>Якщо ви придбали NeurofitnessDay, але не можете увійти — зверніться до мене.</span>
<a class="telegramLink" href="https://t.me/tatyana_neuropsy" target="_blank" rel="noopener noreferrer">Написати у Telegram</a>
</div>
</section>
</main>

<div id="gameApp" class="app hidden">
<button class="logoutButton" type="button" onclick="logout()">🚪 Вийти</button>
<img id="hero" src="assets/neuroshko.png" alt="Нейрошко" onerror="this.style.display='none'">
<h1>NeurofitnessDay</h1>
<p id="progress"></p>
<div id="start">

    <button id="missionButton" class="main" onclick="nextMission()" disabled>
        🌟 Відкрити сьогоднішню місію
    </button>

    <br><br>

    <button id="libraryButton" class="secondary" onclick="openLibrary()" disabled>
        📚 Бібліотека пригод
    </button>

    <br><br>

    <button class="secondary" onclick="resetGame()">
        🔄 Почати спочатку
    </button>
</div>
<div id="library" class="hidden">

<h2>📚 Бібліотека пригод</h2>

<div class="libraryGrid">

    <button class="category home" onclick="openCategory('home')">
🏠<br>Домашні
</button>

<button class="category sport" onclick="openCategory('sport')">
⚽<br>Спорт
</button>

<button class="category mind" onclick="openCategory('mind')">
🧠<br>Розум
</button>

<button class="category creative" onclick="openCategory('creative')">
🎨<br>Творчість
</button>

<button class="category emotion" onclick="openCategory('emotion')">
❤️<br>Емоції
</button>

<button class="category fun" onclick="openCategory('fun')">
😂<br>Кумедні
</button>

<button class="category bonus" onclick="openCategory('bonus')">
🎁<br>Бонус
</button>

<button class="category crazy" onclick="openCategory('crazy')">
⚡<br>Шалені
</button>

</div>

<br>

<button class="secondary" onclick="closeLibrary()">
⬅ Назад
</button>

</div>
<div id="screen2" class="hidden">
<img id="cardImg" class="card" src="">
<br><button id="completeButton" class="main" onclick="completeMission()">✅ Я виконав місію!</button>
<br><button id="libraryBackButton" class="secondary hidden" onclick="backToLibrary()">⬅ Назад до бібліотеки</button>
</div></div><script src="script.js"></script></body></html>
